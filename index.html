<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
<title>Product CRUD System</title>
</head>
<body>
<div class="crud">
  <div class="head">
    <h2>💡 CRUDS 💡</h2>
    <p>Product Management System</p>
  </div>

  <div class="inputs">
    <input type="text" placeholder="Title" id="title">
    <div class="price">
      <input type="number" onkeyup="getTotal()" placeholder="Price" id="price">
      <input type="number" onkeyup="getTotal()" placeholder="Taxes" id="taxes">
      <input type="number" onkeyup="getTotal()" placeholder="Ads" id="ads">
      <input type="number" onkeyup="getTotal()" placeholder="Discounts" id="discounts">
      <small id="total"></small>
      <input type="number" placeholder="Count" id="count">
      <input type="text" placeholder="Category" id="category">
      <button id="submit">Create</button>
    </div>
  </div>

  <div class="outputs">
    <div class="searchBlock">
      <input type="text" id="search" placeholder="Search...">
      <div class="btnSearch">
        <button id="btnsearchTitle">Search By Title</button>
        <button id="btnsearchcategory">Search By Category</button>
      </div>
    </div>
    <table>
      <tr>
        <th>id</th>
        <th>Title</th>
        <th>Price</th>
        <th>Taxes</th>
        <th>Ads</th>
        <th>Discount</th>
        <th>Total</th>
        <th>Category</th>
        <th>Update</th>
        <th>Delete</th>
      </tr>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
